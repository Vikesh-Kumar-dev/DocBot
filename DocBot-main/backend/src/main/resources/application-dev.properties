# ============================================
# DocBot Backend — Dev Profile
# ============================================

# ---- Database (local Postgres) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/docbot
spring.datasource.username=docbot
spring.datasource.password=docbot

# ---- JPA ----
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT (simple secret for local testing) ----
docbot.jwt.secret=DocBotDevSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!!
docbot.jwt.expiration-ms=86400000

# ---- AI Service (local) ----
docbot.ai-service.url=http://localhost:8000

# ---- n8n Webhook (local) ----
docbot.n8n.webhook-url=http://localhost:5678/webhook/booking

# ---- CORS ----
docbot.cors.allowed-origins=http://localhost:5173

# ---- Logging ----
logging.level.com.example.DocBot=DEBUG
logging.level.org.springframework.security=DEBUG
