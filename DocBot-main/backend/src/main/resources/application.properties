# ============================================
# DocBot Backend — Application Properties
# ============================================

spring.application.name=DocBot

# ---- Database ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/docbot}
spring.datasource.username=${DB_USERNAME:docbot}
spring.datasource.password=${DB_PASSWORD:docbot}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- JWT ----
docbot.jwt.secret=${JWT_SECRET:DocBotSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!!}
docbot.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- AI Service ----
docbot.ai-service.url=${AI_SERVICE_URL:http://ai-service:8000}

# ---- n8n Webhook ----
docbot.n8n.webhook-url=${N8N_WEBHOOK_URL:http://n8n:5678/webhook/booking}

# ---- CORS ----
docbot.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ---- Server ----
server.port=${SERVER_PORT:8080}
